<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fund Tracker — Geneva Asset Management</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      background: #0f0f0f;
      color: #f3f4f6;
      line-height: 1.6;
    }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #10B981; border-radius: 4px; }
    
    .dash { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    
    .header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #1f2937;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .logo-img {
      height: 48px;
      width: auto;
    }
    
    .header-info h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }
    
    .header-info p {
      font-size: 14px;
      color: #9ca3af;
    }
    
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #10B981;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 2rem 0 1.5rem 0;
      padding-top: 1rem;
    }
    
    .fund-tabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .fund-card {
      background: linear-gradient(135deg, #1a1a1a 0%, #111827 100%);
      border: 2px solid #1f2937;
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .fund-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #10B981, #059669);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }
    
    .fund-card:hover {
      border-color: #10B981;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
      transform: translateY(-2px);
    }
    
    .fund-card:hover::before { transform: scaleX(1); }
    
    .fund-card.active {
      border-color: #10B981;
      background: linear-gradient(135deg, #10B981, #059669);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
    }
    
    .fund-card-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #10B981;
    }
    
    .fund-card.active .fund-card-name { color: #ffffff; }
    
    .fund-card-aum {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }
    
    .fund-card-meta {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 1rem;
    }
    
    .fund-card.active .fund-card-meta { color: rgba(255, 255, 255, 0.8); }
    
    .fund-card-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .stat { text-align: center; }
    
    .stat-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.25rem;
    }
    
    .stat-value {
      font-size: 14px;
      font-weight: 600;
      color: #f3f4f6;
    }
    
    .stat-value.positive { color: #10B981; }
    .stat-value.negative { color: #ef4444; }
    
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .metric {
      background: linear-gradient(135deg, #1a1a1a 0%, #111827 100%);
      border: 1px solid #1f2937;
      border-left: 3px solid #10B981;
      border-radius: 8px;
      padding: 1.25rem;
      transition: all 0.3s;
    }
    
    .metric:hover {
      border-color: #10B981;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
    }
    
    .metric-label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .metric-value {
      font-size: 24px;
      font-weight: 700;
      color: #10B981;
    }
    
    .metric-sub {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 0.5rem;
    }
    
    .charts-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .chart-card {
      background: linear-gradient(135deg, #1a1a1a 0%, #111827 100%);
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s;
    }
    
    .chart-card:hover {
      border-color: #10B981;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
    }
    
    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: #f3f4f6;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .badge-latest {
      background: rgba(16, 185, 129, 0.2);
      color: #10B981;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .leg-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 12px;
      color: #9ca3af;
    }
    
    .leg-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    
    .chart-container {
      position: relative;
      height: 200px;
      margin-bottom: 1rem;
    }
    
    .slider-container {
      margin-top: 1.5rem;
    }
    
    .slider-label {
      font-size: 12px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 0.75rem;
      display: block;
    }
    
    .range-slider {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #1f2937;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    
    .range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #10B981;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
      transition: all 0.2s;
      border: 2px solid #0f0f0f;
    }
    
    .range-slider::-webkit-slider-thumb:hover {
      width: 22px;
      height: 22px;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
    }
    
    .range-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #10B981;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
      border: 2px solid #0f0f0f;
      transition: all 0.2s;
    }
    
    .range-slider::-moz-range-thumb:hover {
      width: 22px;
      height: 22px;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
    }
    
    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 11px;
      color: #6b7280;
    }
    
    .slider-value {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #10B981;
      margin-top: 0.75rem;
    }
    
    .dropdown-container {
      position: relative;
      display: inline-block;
    }
    
    .dropdown-btn {
      background: #1a1a1a;
      color: #f3f4f6;
      padding: 0.5rem 1rem;
      border: 1px solid #1f2937;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .dropdown-btn:hover {
      border-color: #10B981;
      color: #10B981;
    }
    
    .dropdown-content {
      position: absolute;
      background: #1a1a1a;
      min-width: 160px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      padding: 0.5rem 0;
      z-index: 100;
      border: 1px solid #1f2937;
      border-radius: 6px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .dropdown-content a {
      color: #9ca3af;
      padding: 0.75rem 1rem;
      text-decoration: none;
      display: block;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .dropdown-content a:hover {
      background: #111827;
      color: #10B981;
      padding-left: 1.25rem;
    }
    
    .dropdown-content a.active {
      background: rgba(16, 185, 129, 0.1);
      color: #10B981;
      font-weight: 600;
    }
    
    .holdings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 1rem;
    }
    
    .holdings-table th {
      text-align: left;
      padding: 0.75rem;
      color: #9ca3af;
      font-weight: 500;
      font-size: 12px;
      border-bottom: 1px solid #1f2937;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .holdings-table td {
      padding: 1rem 0.75rem;
      border-bottom: 1px solid #1f2937;
      color: #f3f4f6;
    }
    
    .holdings-table tr:hover {
      background: rgba(16, 185, 129, 0.05);
    }
    
    .ticker {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      background: rgba(16, 185, 129, 0.1);
      color: #10B981;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    
    .chg-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 0.5rem;
    }
    
    .chg-up { background: rgba(16, 185, 129, 0.2); color: #10B981; }
    .chg-dn { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .chg-new { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    
    .bar-wrap { margin-bottom: 1rem; }
    
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 0.5rem;
    }
    
    .bar-track {
      height: 6px;
      background: #1f2937;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #10B981;
      transition: width 0.3s;
    }
    
    .footer-text {
      font-size: 11px;
      color: #6b7280;
      padding-top: 1.5rem;
      margin-top: 2rem;
      border-top: 1px solid #1f2937;
      line-height: 1.8;
    }
    
    .footer-text strong { color: #9ca3af; }
    
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem;
    }
    
    .nav-history {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    .nav-point { text-align: center; }
    .nav-point-short { font-size: 11px; color: #9ca3af; margin-bottom: 0.25rem; }
    .nav-point-value { font-size: 16px; font-weight: 700; color: #f3f4f6; }
    .nav-point-change { font-size: 11px; margin-top: 0.25rem; }
    
    .dividend-table { margin-top: 1rem; }
    
    @media (max-width: 768px) {
      .dash { padding: 1rem; }
      .header { flex-direction: column; align-items: flex-start; }
      .header-info h1 { font-size: 24px; }
      .fund-tabs { grid-template-columns: 1fr; }
      .charts-row { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="dash">
  <div class="header">
    <div class="header-left">
      <img src="logo.png" alt="Geneva Asset Management" class="logo-img">
      <div class="header-info">
        <h1>Fund Tracker</h1>
        <p>Geneva Asset Management</p>
      </div>
    </div>
  </div>
  
  <p class="section-title">Portfolio Overview</p>
  <div class="fund-tabs" id="fundTabs"></div>
  
  <div id="fundDetail"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const META = {
  encina:   { id:'encina',   name:'Encina Fund',               ticker:'ENCINA',   color:'#10B981', navInitial:100,  inception:'2022-03-01', expenseRatio:'1.00%' },
  gusifund: { id:'gusifund', name:'GenAsset U.S. Income Fund', ticker:'GUSIFUND', color:'#3b82f6', navInitial:100,  inception:'2026-02-25', expenseRatio:'0.50%', div:true },
  tagua:    { id:'tagua',    name:'Tagua Fund',                 ticker:'TAGUA',    color:'#8b5cf6', navInitial:1000, inception:'2010-08-16', expenseRatio:'Equities 1.0625% / Others 0.3625%' }
};

let DB = null, ADM = null, TIMELINE = null, LATEST_MONTH = null;
let activeFund = 'encina', viewMonth = null;
let charts = {};

async function loadData() {
  try {
    const cacheBuster = Math.floor(Date.now() / 60000);
    const response = await fetch(`data.json?v=${cacheBuster}`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const data = await response.json();
    TIMELINE = data.timeline;
    DB = data.months;
    ADM = data.administrators;
    LATEST_MONTH = TIMELINE[TIMELINE.length - 1];
    viewMonth = LATEST_MONTH;
    
    initializeApp();
  } catch (error) {
    console.error('Failed to load data:', error);
    document.getElementById('fundDetail').innerHTML = `<div class="error"><strong>Error loading fund data</strong><br>Could not fetch data.json. Please refresh the page.</div>`;
  }
}

const fmt  = n => '$' + n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
const fmtM = n => '$' + (n / 1e6).toFixed(2) + 'M';
const pct  = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const clr  = n => n >= 0 ? 'positive' : 'negative';

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

const piePalettes = { encina: ['#10B981','#6ee7b7'], gusifund: ['#3b82f6','#60a5fa','#93c5fd'], tagua: ['#8b5cf6','#d8b4fe'] };
const holdingColors = ['#10B981','#3b82f6','#8b5cf6','#f59e0b','#ec4899','#ef4444','#6366f1','#14b8a6','#f97316','#06b6d4'];

function getPrevData(fundId) {
  const idx = TIMELINE.indexOf(viewMonth);
  if (idx <= 0) return null;
  return DB[TIMELINE[idx - 1]][fundId];
}

function changeBadge(h, prevHoldings) {
  if (!prevHoldings) return '';
  if (h.pp === null || h.pp === undefined) return '<span class="chg-badge chg-new">NEW</span>';
  const d = h.p - h.pp;
  if (Math.abs(d) < 0.05) return '';
  return `<span class="chg-badge ${d > 0 ? 'chg-up' : 'chg-dn'}">${d > 0 ? '▲' : '▼'} ${Math.abs(d).toFixed(2)}%</span>`;
}

function renderTabs() {
  const t = document.getElementById('fundTabs');
  t.innerHTML = Object.values(META).map(meta => {
    const f = DB[viewMonth][meta.id];
    const isActive = meta.id === activeFund;
    return `
      <div class="fund-card ${isActive ? 'active' : ''}" onclick="setFund('${meta.id}')">
        <div class="fund-card-name">${meta.name}</div>
        <div class="fund-card-aum">${fmtM(f.aum)}</div>
        <div class="fund-card-meta">AUM · ${f.shareholders} shareholders</div>
        <div class="fund-card-stats">
          <div class="stat">
            <div class="stat-label">NAV</div>
            <div class="stat-value">${fmt(f.nav)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">MTD</div>
            <div class="stat-value ${clr(f.returnMtd)}">${pct(f.returnMtd)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total</div>
            <div class="stat-value ${clr(f.returnTotal)}">${pct(f.returnTotal)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderDetail() {
  destroyCharts();
  
  if (!DB[viewMonth] || !DB[viewMonth][activeFund]) {
    console.error('Data not found');
    return;
  }
  
  const meta = META[activeFund];
  const f = DB[viewMonth][activeFund];
  const latestF = DB[LATEST_MONTH][activeFund];
  const prev = getPrevData(activeFund);
  const showChg = prev !== null;
  const totalHoldingPct = f.holdings.reduce((s, h) => s + h.p, 0);
  
  const currentMonthIdx = TIMELINE.indexOf(viewMonth);
  const navHist = TIMELINE.slice(0, currentMonthIdx + 1).map(t => ({
    short: DB[t].short, label: DB[t].label,
    nav: DB[t][activeFund].nav, aum: DB[t][activeFund].aum
  }));
  
  const showNavChart = navHist.length >= 1;
  const prevHoldings = prev ? prev.holdings : null;
  const d = document.getElementById('fundDetail');
  
  d.innerHTML = `
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">AUM</div><div class="metric-value">${fmtM(f.aum)}</div>
        ${prev ? `<div class="metric-sub ${clr(f.aum - prev.aum)}">${f.aum >= prev.aum ? '▲' : '▼'} ${fmtM(Math.abs(f.aum - prev.aum))}</div>` : ''}
      </div>
      <div class="metric"><div class="metric-label">NAV per Share</div><div class="metric-value">${fmt(f.nav)}</div>
        <div class="metric-sub">Initial ${fmt(meta.navInitial)}</div>
      </div>
      <div class="metric"><div class="metric-label">MTD</div><div class="metric-value ${clr(f.returnMtd)}">${pct(f.returnMtd)}</div></div>
      <div class="metric"><div class="metric-label">YTD</div><div class="metric-value ${clr(f.returnYtd)}">${pct(f.returnYtd)}</div></div>
      <div class="metric"><div class="metric-label">Total Return</div><div class="metric-value ${clr(f.returnTotal)}">${pct(f.returnTotal)}</div></div>
      ${f.returnAvg ? `<div class="metric"><div class="metric-label">Historical Avg</div><div class="metric-value">${f.returnAvg.toFixed(2)}%</div><div class="metric-sub">${f.years} years</div></div>` : `<div class="metric"><div class="metric-label">Time</div><div class="metric-value">${f.years} years</div></div>`}
    </div>
    
    <div class="chart-card" style="margin-bottom: 1.5rem;">
      <div class="chart-title" style="display: flex; justify-content: space-between; align-items: center;">
        <span>Holdings Detail</span>
        <div class="dropdown-container">
          <button class="dropdown-btn" onclick="toggleDropdown(event)">
            <span id="selectedMonthDisplay">${DB[viewMonth].short}</span>
            <span>▼</span>
          </button>
          <div id="monthDropdown" class="dropdown-content" style="display: none;">
            ${TIMELINE.map(m => `<a onclick="setMonth('${m}')" class="${m === viewMonth ? 'active' : ''}">${DB[m].label}</a>`).join('')}
          </div>
        </div>
      </div>
      <table class="holdings-table">
        <thead><tr><th>Symbol</th><th>Name</th><th style="text-align: right;">%</th><th style="text-align: right;">USD Value</th>${showChg ? '<th></th>' : ''}</tr></thead>
        <tbody>
          ${f.holdings.map(h => `<tr><td><span class="ticker">${h.s}</span></td><td style="color: #9ca3af;">${h.n}</td><td style="text-align: right;">${h.p.toFixed(2)}%</td><td style="text-align: right;">${fmtM(f.aum * h.p / 100)}</td>${showChg ? `<td>${changeBadge(h, prevHoldings)}</td>` : ''}</tr>`).join('')}
        </tbody>
        <tfoot><tr style="font-weight: 600; border-top: 2px solid #1f2937;"><td colspan="2">Total</td><td style="text-align: right;">${totalHoldingPct.toFixed(2)}%</td><td style="text-align: right;">${fmtM(f.aum * totalHoldingPct / 100)}</td>${showChg ? '<td></td>' : ''}</tr></tfoot>
      </table>
    </div>
    
    ${showNavChart ? `
    <div class="chart-card">
      <div class="chart-title">NAV Evolution</div>
      <div class="nav-history">
        ${navHist.length > 0 ? navHist.map((p, i) => `<div class="nav-point"><div class="nav-point-short">${p.short}</div><div class="nav-point-value">${fmt(p.nav)}</div>${i > 0 ? `<div class="nav-point-change ${clr(p.nav - navHist[i-1].nav)}">${p.nav >= navHist[i-1].nav ? '▲' : '▼'} ${fmt(Math.abs(p.nav - navHist[i-1].nav))}</div>` : ''}</div>`).join('') : '<p style="color: #9ca3af;">No data available</p>'}
      </div>
      <div class="chart-container"><canvas id="navTrendChart"></canvas></div>
      <div class="slider-container">
        <label class="slider-label">Select Month</label>
        <input type="range" id="monthSlider" class="range-slider" min="0" max="${TIMELINE.length - 1}" value="${TIMELINE.indexOf(viewMonth)}" onchange="setMonth(TIMELINE[parseInt(this.value)])">
        <div class="slider-labels">
          ${TIMELINE.map((m, i) => `<span style="flex: 1; text-align: ${i === 0 ? 'left' : i === TIMELINE.length - 1 ? 'right' : 'center'}">${DB[m].short}</span>`).join('')}
        </div>
        <div class="slider-value" id="sliderValue">${DB[viewMonth].label}</div>
      </div>
    </div>` : ''}
    
    ${f.dividendYield ? `
    <div class="chart-card" style="margin-bottom: 1.5rem;">
      <div class="chart-title">Dividends 2026</div>
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">Dividend Yield</div><div class="metric-value">${f.dividendYield.toFixed(2)}%</div></div>
        <div class="metric"><div class="metric-label">Per Share (Quarterly)</div><div class="metric-value">$${f.dividendPerShare.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">Frequency</div><div class="metric-value" style="font-size: 16px;">Quarterly</div></div>
      </div>
      <table class="holdings-table dividend-table">
        <thead><tr><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>
          ${f.divs.map(dv => `<tr><td>${dv.d}</td><td>$${dv.a.toFixed(2)}</td><td><span style="color: ${dv.paid ? '#10B981' : '#9ca3af'}; font-weight: 600;">${dv.paid ? '✓ Paid' : 'Expected'}</span></td></tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
    
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Asset Allocation </div>
        <div class="legend-row" id="pieLegend_${activeFund}"></div>
        <div class="chart-container"><canvas id="pieChart_${activeFund}"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Annual Net Return</div>
        <div class="chart-container"><canvas id="barChart_${activeFund}"></canvas></div>
      </div>
    </div>
    
    <div class="chart-card" style="margin-bottom: 1.5rem;">
      <div class="chart-title">Geographic Allocation </div>
      ${latestF.countries.map(c => `<div class="bar-wrap"><div class="bar-label"><span>${c.l}</span><span>${c.p}%</span></div><div class="bar-track"><div class="bar-fill" style="width: ${c.p}%; background: ${meta.color};"></div></div></div>`).join('')}
    </div>
    
    <div class="chart-card" style="margin-bottom: 1.5rem;">
      <div class="chart-title">Top Holdings </div>
      <div class="chart-container"><canvas id="holdChart_${activeFund}"></canvas></div>
    </div>
    
    <div class="footer-text">
      <strong>Data as of:</strong> ${DB[viewMonth].label}<br>
      <strong>Fund Manager:</strong> ${ADM[activeFund] || 'Geneva Asset Management, S.A.'}<br>
      <strong>Expense Ratio:</strong> ${meta.expenseRatio}
    </div>
  `;
  
  const pal = piePalettes[activeFund] || holdingColors;
  const legend = document.getElementById(`pieLegend_${activeFund}`);
  if (legend) {
    legend.innerHTML = latestF.allocation.map((a, i) => `<span class="leg-item"><span class="leg-dot" style="background: ${pal[i]}"></span>${a.l} ${a.p}%</span>`).join('');
  }
  
  setTimeout(() => {
    const ntCtx = document.getElementById('navTrendChart');
    if (ntCtx) {
      charts['navTrend'] = new Chart(ntCtx, {
        type: 'line',
        data: { labels: navHist.map(p => p.label), datasets: [{ data: navHist.map(p => p.nav), borderColor: meta.color, backgroundColor: meta.color + '20', borderWidth: 3, fill: true, tension: 0.4, pointRadius: 5, pointBackgroundColor: meta.color, pointBorderColor: '#0f0f0f', pointBorderWidth: 2 }]},
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a1a', titleColor: '#f3f4f6', bodyColor: '#f3f4f6', borderColor: meta.color, borderWidth: 1, callbacks: { label: c => ` NAV: ${fmt(c.raw)}` } } }, scales: { x: { ticks: { font: { size: 11 }, color: '#6b7280' }, grid: { display: false } }, y: { ticks: { callback: v => '$' + v.toFixed(0), font: { size: 11 }, color: '#6b7280' }, grid: { color: '#1f2937' } } } }
      });
    }
    
    const pieCtx = document.getElementById(`pieChart_${activeFund}`);
    if (pieCtx) {
      charts['pie'] = new Chart(pieCtx, {
        type: 'doughnut',
        data: { labels: latestF.allocation.map(a => a.l), datasets: [{ data: latestF.allocation.map(a => a.p), backgroundColor: pal, borderWidth: 2, borderColor: '#0f0f0f' }]},
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a1a', titleColor: '#f3f4f6', bodyColor: '#f3f4f6', borderColor: meta.color, borderWidth: 1, callbacks: { label: c => ` ${c.label}: ${c.raw}%` } } }, cutout: '60%' }
      });
    }
    
    const barCtx = document.getElementById(`barChart_${activeFund}`);
    if (barCtx) {
      const vals = f.annualReturns.map(r => r.v);
      charts['bar'] = new Chart(barCtx, {
        type: 'bar',
        data: { labels: f.annualReturns.map(r => r.y), datasets: [{ label: 'Return %', data: vals, backgroundColor: vals.map(v => v >= 0 ? meta.color : '#ef4444'), borderRadius: 4, borderSkipped: false }]},
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 11 }, autoSkip: false, color: '#6b7280' }, grid: { display: false } }, y: { ticks: { callback: v => v + '%', font: { size: 11 }, color: '#6b7280' }, grid: { color: '#1f2937' } } } }
      });
    }
    
    const holdCtx = document.getElementById(`holdChart_${activeFund}`);
    if (holdCtx) {
      charts['hold'] = new Chart(holdCtx, {
        type: 'bar',
        data: { labels: latestF.holdings.map(h => h.s), datasets: [{ label: '%', data: latestF.holdings.map(h => h.p), backgroundColor: holdingColors.slice(0, latestF.holdings.length), borderRadius: 3 }]},
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a1a', titleColor: '#f3f4f6', bodyColor: '#f3f4f6', borderColor: meta.color, borderWidth: 1, callbacks: { label: c => ` ${c.raw.toFixed(2)}% · ${fmtM(latestF.aum * c.raw / 100)}` } } }, scales: { x: { ticks: { callback: v => v + '%', font: { size: 11 }, color: '#6b7280' }, grid: { color: '#1f2937' } }, y: { ticks: { font: { size: 11 }, autoSkip: false, color: '#6b7280' }, grid: { display: false } } } }
      });
    }
  }, 100);
}

function setFund(id) {
  activeFund = id;
  renderTabs();
  renderDetail();
}

function setMonth(month) {
  viewMonth = month;
  const idx = TIMELINE.indexOf(month);
  document.getElementById('selectedMonthDisplay').textContent = DB[month].short;
  document.getElementById('monthSlider').value = idx;
  document.getElementById('sliderValue').textContent = DB[month].label;
  document.getElementById('monthDropdown').style.display = 'none';
  renderTabs();
  renderDetail();
}

function toggleDropdown(e) {
  e.stopPropagation();
  const dropdown = document.getElementById('monthDropdown');
  dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', () => {
  const dropdown = document.getElementById('monthDropdown');
  if (dropdown) dropdown.style.display = 'none';
});

function initializeApp() {
  renderTabs();
  renderDetail();
}

loadData();
</script>
</body>
</html>
